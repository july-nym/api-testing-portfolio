[pytest]
# rootdir-relative imports (config/, utils/) resolve because pytest prepends the
# conftest directory to sys.path under the default import mode.
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --color=yes

# Registering markers explicitly + --strict-markers means a typo'd marker fails
# the run instead of silently doing nothing.
markers =
    smoke: fast, must-always-pass checks for a quick health signal
    regression: fuller coverage run on PRs and nightly
    negative: error-path and edge-case assertions
